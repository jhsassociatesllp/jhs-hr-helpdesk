

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHS Helpdesk - Admin Login</title>
    <link rel="stylesheet" href="/static/adminlogin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="0" y1="21" x2="24" y2="21"></line>
                        <line x1="8" y1="21" x2="16" y2="21" stroke-width="3"></line>
                    </svg>
                </div>
                <h1 id="logoTitle">JHS IT Admin</h1>
                <p>Helpdesk Management System</p>
            </div>

            <form id="loginForm" class="login-form">
                <!-- Helpdesk Type Selector -->
                <div class="form-group">
                    <label for="helpdeskType">Select Helpdesk</label>
                    <select id="helpdeskType" required>
                        <option value="">-- Choose Helpdesk --</option>
                        <option value="hr">HR Helpdesk</option>
                        <option value="it">IT Helpdesk</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="empCode">Employee Code</label>
                    <input 
                        type="text" 
                        id="empCode" 
                        placeholder="JHS0001" 
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loading hidden">Logging in...</span>
                </button>
            </form>

            <div id="loginMessage" class="message hidden"></div>
        </div>
    </div>

    <script src="/static/adminlogin.js"></script>
</body>
</html>
